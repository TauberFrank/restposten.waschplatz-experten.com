<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Kleinanzeigen-Vorbereitung – WPE Restposten</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #f3f4f6; color: #111827; line-height: 1.6; }

  nav { background: #111827; color: white; padding: 12px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  nav .logo { font-weight: 800; font-size: 15px; color: white; text-decoration: none; }
  nav a { color: #9ca3af; font-size: 12px; text-decoration: none; }
  nav a:hover { color: white; }

  .container { max-width: 1000px; margin: 0 auto; padding: 28px 16px; }

  .footer-block { background: white; border-radius: 12px; border: 2px solid #e5e7eb; padding: 20px; margin-bottom: 32px; position: relative; }
  .footer-block h2 { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: #6b7280; margin-bottom: 10px; }
  .copy-area { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px 16px; padding-right: 110px; font-size: 13px; white-space: pre-line; color: #374151; line-height: 1.9; }
  .copy-btn { position: absolute; top: 20px; right: 20px; background: #2563eb; color: white; border: none; border-radius: 6px; padding: 6px 16px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .copy-btn:hover { background: #1d4ed8; }
  .copy-btn.copied { background: #16a34a; }

  .product-card { background: white; border-radius: 14px; border: 2px solid #e5e7eb; margin-bottom: 28px; overflow: hidden; }
  .card-header { background: #111827; color: white; padding: 14px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .card-header h2 { font-size: 16px; font-weight: 900; flex: 1; }
  .badge-price { background: #dc2626; color: white; border-radius: 8px; padding: 4px 12px; font-weight: 800; font-size: 14px; }
  .badge-discount { background: #374151; color: #fbbf24; border-radius: 8px; padding: 4px 10px; font-weight: 800; font-size: 12px; }
  .card-body { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width: 680px) { .card-body { grid-template-columns: 1fr; } }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: #6b7280; margin-bottom: 5px; }
  .char-count { font-weight: 400; color: #9ca3af; }
  .char-count.over { color: #dc2626; font-weight: 700; }

  .copy-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-size: 12.5px; color: #374151; line-height: 1.7; position: relative; }
  .copy-box.multiline { padding-bottom: 42px; }
  .copy-btn-sm { background: #2563eb; color: white; border: none; border-radius: 6px; padding: 4px 12px; font-size: 11px; font-weight: 700; cursor: pointer; }
  .copy-btn-sm:hover { background: #1d4ed8; }
  .copy-btn-sm.copied { background: #16a34a; }
  .btn-row { margin-top: 10px; display: flex; gap: 6px; }

  /* BILDER */
  .images-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: #6b7280; margin-bottom: 8px; }
  .images-hint { font-size: 11px; color: #9ca3af; margin-bottom: 10px; }
  .images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .img-item { border-radius: 8px; overflow: hidden; border: 2px solid #e5e7eb; background: #f9fafb; }
  .img-item:hover { border-color: #2563eb; }
  .img-item img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
  .img-item a { display: block; background: #f3f4f6; text-align: center; padding: 5px 4px; font-size: 11px; font-weight: 700; color: #2563eb; text-decoration: none; border-top: 1px solid #e5e7eb; }
  .img-item a:hover { background: #2563eb; color: white; }
  .img-main { border-color: #dc2626; }
  .img-main-tag { background: #dc2626; color: white; font-size: 10px; font-weight: 800; padding: 2px 6px; text-align: center; }

  .condition-banner { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #92400e; margin-top: 10px; }
</style>
</head>
<body>

<nav>
  <a class="logo" href="./index.html">WPE Restposten</a>
  <a href="./index.html">← Zurück</a>
</nav>

<div class="container">

  <div class="footer-block">
    <h2>Kontakttext — ans Ende jeder Anzeige</h2>
    <div class="copy-area" id="footer-text">📍 75223 Niefern-Öschelbronn (Raum Pforzheim / Karlsruhe / Stuttgart)
🚗 Nur Selbstabholung · Barzahlung
📞 Tel. 01733435961 – bitte vor Anfahrt anrufen!
✉️ Anfragen per PN oder Telefon</div>
    <button class="copy-btn" onclick="copyById('footer-text', this)">Kopieren</button>
  </div>

  <div id="products-container"></div>

</div>

<script src="./products-data.js"></script>
<script>
  const MAX_TITLE = 65;

  const FOOTER = `\n\n📍 75223 Niefern-Öschelbronn (Raum Pforzheim / Karlsruhe / Stuttgart)\n🚗 Nur Selbstabholung · Barzahlung\n📞 Tel. 01733435961 – bitte vor Anfahrt anrufen!\n✉️ Anfragen per PN oder Telefon`;

  function copyById(id, btn) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(() => feedback(btn));
  }
  function copyStr(text, btn) {
    navigator.clipboard.writeText(text).then(() => feedback(btn));
  }
  function feedback(btn) {
    const orig = btn.textContent;
    btn.textContent = '✓ Kopiert!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  }

  function buildTitle(p) {
    return `${p.title} ${p.width} – ${p.discount}% | AUSSTELLUNGSSTÜCK`;
  }

  function buildText(p) {
    const price = p.price.toLocaleString('de-DE', {minimumFractionDigits: 0, maximumFractionDigits: 2});
    const orig  = p.originalPrice.toLocaleString('de-DE', {minimumFractionDigits: 0, maximumFractionDigits: 0});
    const specs = p.specs.map(s => `• ${s[0]}: ${s[1]}`).join('\n');

    let text = `Ausstellungsstück – unbenutzt, nie installiert.\nStatt ${orig} € · Nur ${price} € (–${p.discount}%)\n\n✓ Hochwertige Möbel mit Softclose, Selbsteinzug und Dämpfung\n\nUmfang:\n${specs}`;

    if (p.condition) text += `\n\n⚠️ ${p.condition}`;

    text += FOOTER;
    return text;
  }

  const container = document.getElementById('products-container');

  PRODUCT_ORDER.forEach((id, idx) => {
    const p = PRODUCTS[id];
    if (!p) return;

    const titleText = buildTitle(p);
    const bodyText  = buildText(p);
    const price     = p.price.toLocaleString('de-DE', {minimumFractionDigits: 0, maximumFractionDigits: 2});
    const tLen      = titleText.length;
    const tClass    = tLen > MAX_TITLE ? 'over' : '';

    const imgHTML = p.images.map((src, i) => {
      const fname = `${id}-${i+1}.webp`;
      return `
        <div class="img-item${i === 0 ? ' img-main' : ''}">
          ${i === 0 ? '<div class="img-main-tag">Titelbild</div>' : ''}
          <img src="${src}" alt="Bild ${i+1}" loading="lazy">
          <a href="${src}" download="${fname}">↓ Bild ${i+1}</a>
        </div>`;
    }).join('');

    const condBanner = p.condition
      ? `<div class="condition-banner"><strong>⚠️ Zustand:</strong> ${p.condition}</div>`
      : '';

    const bodyHtml = bodyText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');

    container.insertAdjacentHTML('beforeend', `
    <div class="product-card">
      <div class="card-header">
        <h2>${idx+1}. ${p.title} <span style="font-weight:400;opacity:.7">${p.width}</span></h2>
        <span class="badge-discount">–${p.discount}%</span>
        <span class="badge-price">${price} €</span>
      </div>
      <div class="card-body">
        <div>
          <div class="field">
            <div class="field-label">Titel <span class="char-count ${tClass}">${tLen} / ${MAX_TITLE} Zeichen</span></div>
            <div class="copy-box">${titleText.replace(/&/g,'&amp;')}
              <div class="btn-row"><button class="copy-btn-sm" onclick="copyStr(${JSON.stringify(titleText)}, this)">Kopieren</button></div>
            </div>
          </div>
          <div class="field">
            <div class="field-label">Anzeigentext</div>
            <div class="copy-box multiline">${bodyHtml}
              <div class="btn-row"><button class="copy-btn-sm" onclick="copyStr(${JSON.stringify(bodyText)}, this)">Kopieren</button></div>
            </div>
          </div>
          <div class="field">
            <div class="field-label">Preis</div>
            <div class="copy-box">${price} €
              <div class="btn-row"><button class="copy-btn-sm" onclick="copyStr('${price}', this)">Kopieren</button></div>
            </div>
          </div>
          ${condBanner}
        </div>
        <div>
          <div class="images-label">Bilder (${p.images.length} Stück)</div>
          <div class="images-hint">↓ Download-Link anklicken → dann in Kleinanzeigen hochladen</div>
          <div class="images-grid">${imgHTML}</div>
        </div>
      </div>
    </div>`);
  });
</script>
</body>
</html>
